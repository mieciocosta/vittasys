<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2BBCB3">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VittaSys">
  <link rel="apple-touch-icon" href="/assets/logos/logo-icon-color.png">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>VittaSys — Vittalis Saúde</title>
  <link rel="icon" href="assets/logos/logo-icon-color.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
  <!-- ══ SPLASH SCREEN — aparece enquanto JS carrega ══ -->
  <div id="app-splash" style="
    position:fixed;inset:0;z-index:99999;
    background:#0f1a2e;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:24px;
    transition:opacity .4s ease;
  ">
    <img src="/assets/logos/logo-vertical-color.png" alt="Vittalis Saúde"
      style="width:min(240px,65vw);height:auto;object-fit:contain;
             filter:drop-shadow(0 4px 24px rgba(43,188,179,.3));
             animation:splashPulse 1.8s ease-in-out infinite alternate;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="width:40px;height:3px;border-radius:2px;background:#2BBCB3;
                  animation:splashBar 1.2s ease-in-out infinite;"></div>
      <p style="color:#64748b;font-size:12px;font-family:sans-serif;margin:0;letter-spacing:.05em">
        Carregando sistema...
      </p>
    </div>
  </div>
  <style>
    @keyframes splashPulse{from{opacity:.85;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
    @keyframes splashBar{0%{width:20px;opacity:.4}50%{width:48px;opacity:1}100%{width:20px;opacity:.4}}
  </style>

  <div id="app"></div>
  <script src="js/utils/api.js"></script>
  <script src="js/utils/helpers.js"></script>
  <script src="js/utils/icons.js"></script>
  <script src="js/utils/state.js"></script>
  <script src="js/utils/ui.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/login.js"></script>
  <script src="js/components/sidebar.js"></script>
  <script src="js/components/pagination.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/components/dashboard.js"></script>
  <script src="js/components/retirada.js"></script>
  <script src="js/components/estoque.js"></script>
  <script src="js/components/historico.js"></script>
  <script src="js/components/planos.js"></script>
  <script src="js/components/clientes.js"></script>
  <script src="js/components/financeiro.js"></script>
  <script src="js/components/metas.js"></script>
  <script src="js/components/agenda.js"></script>
  <script src="js/components/usuarios.js"></script>
  <script src="js/components/relatorios.js"></script>
  <script src="js/components/alertas.js"></script>
  <script src="js/components/aprovacoes.js"></script>
  <script src="js/components/estimativas.js"></script>
  <script src="js/components/auditoria.js"></script>
  <script src="js/components/camera-audit.js"></script>
  <script src="js/app.js"></script>
  <script src="js/mobile.js"></script>
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(()=>{});
      });
    }
  </script>
  <script>
    // Esconder splash quando o conteúdo principal renderizar
    (function(){
      var splash = document.getElementById('app-splash');
      if(!splash) return;
      // Aguardar o #app ter conteúdo real (não vazio)
      var obs = new MutationObserver(function(){
        var app = document.getElementById('app');
        if(app && app.children.length > 0){
          splash.style.opacity = '0';
          setTimeout(function(){ splash.style.display='none'; }, 420);
          obs.disconnect();
        }
      });
      obs.observe(document.body, {childList:true, subtree:true});
      // Fallback: remover após 5s de qualquer forma
      setTimeout(function(){
        splash.style.opacity='0';
        setTimeout(function(){splash.style.display='none';},420);
      }, 5000);
    })();
  </script>
</body>
</html>
