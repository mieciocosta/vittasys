<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2BBCB3">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VittaSys">
  <link rel="apple-touch-icon" href="/assets/logos/logo-icon-color.png">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>VittaSys — Vittalis Saúde</title>
  <link rel="icon" href="assets/logos/logo-icon-color.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
  <!-- SPLASH -->
  <style>
    #sp{position:fixed;inset:0;z-index:99999;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .5s}
    #sp img{width:min(220px,60vw);animation:p 1.6s ease-in-out infinite alternate}
    #sp-bar{width:40px;height:3px;border-radius:2px;background:#2BBCB3;animation:b 1.1s ease-in-out infinite}
    #sp-txt{font:12px/1 sans-serif;color:#94a3b8;letter-spacing:.06em}
    @keyframes p{to{opacity:.7;transform:scale(.96)}}
    @keyframes b{0%,100%{width:20px;opacity:.3}50%{width:50px;opacity:1}}
  </style>
  <div id="sp">
    <img src="/assets/logos/logo-splash.png" alt="Vittalis Saúde" onerror="this.style.display='none'">
    <div id="sp-bar"></div>
    <div id="sp-txt">SISTEMA DE GESTÃO DE VACINAÇÃO</div>
  </div>
  <script>
    // Hide splash ONLY after app renders — watch for #app content
    (function(){
      function hide(){var el=document.getElementById('sp');if(el){el.style.opacity='0';setTimeout(function(){el.remove()},520)}}
      // Watch for app content
      var obs=new MutationObserver(function(){
        var app=document.getElementById('app');
        if(app&&app.innerHTML.trim().length>50){obs.disconnect();setTimeout(hide,200);}
      });
      document.addEventListener('DOMContentLoaded',function(){
        var app=document.getElementById('app');
        if(app) obs.observe(app,{childList:true,subtree:true,characterData:true});
        // Hard fallback
        setTimeout(hide,6000);
      });
    })();
  </script>
  <div id="app"></div>
  <script src="js/utils/api.js"></script>
  <script src="js/utils/helpers.js"></script>
  <script src="js/utils/icons.js"></script>
  <script src="js/utils/state.js"></script>
  <script src="js/utils/ui.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/login.js"></script>
  <script src="js/components/sidebar.js"></script>
  <script src="js/components/pagination.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/components/dashboard.js"></script>
  <script src="js/components/retirada.js"></script>
  <script src="js/components/estoque.js"></script>
  <script src="js/components/historico.js"></script>
  <script src="js/components/planos.js"></script>
  <script src="js/components/clientes.js"></script>
  <script src="js/components/financeiro.js"></script>
  <script src="js/components/metas.js"></script>
  <script src="js/components/agenda.js"></script>
  <script src="js/components/usuarios.js"></script>
  <script src="js/components/relatorios.js"></script>
  <script src="js/components/alertas.js"></script>
  <script src="js/components/aprovacoes.js"></script>
  <script src="js/components/estimativas.js"></script>
  <script src="js/components/auditoria.js"></script>
  <script src="js/components/camera-audit.js"></script>

  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(()=>{});
      });
    }
  </script>
</body>
